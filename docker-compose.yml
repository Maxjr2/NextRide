##
## NextRide — Full stack (PostgreSQL + Keycloak + API)
## Usage: docker compose up
##

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextride"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
      KC_HOSTNAME: keycloak
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        DATABASE_URL: postgresql://localhost:5432/placeholder
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      MOCK_MODE: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      KEYCLOAK_ISSUER: http://keycloak:${KEYCLOAK_PORT:-8080}/realms/nextride
      KEYCLOAK_JWKS_URI: http://keycloak:${KEYCLOAK_PORT:-8080}/realms/nextride/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: nextride-api
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    command: >
      sh -c "
        cd apps/api &&
        npx prisma migrate deploy &&
        if [ \"$SEED\" = 'true' ]; then node dist/repositories/prisma/seed.js; fi &&
        node dist/index.js
      "

volumes:
  db_data: