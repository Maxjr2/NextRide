name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type checking ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - run: npx tsc --noEmit
        working-directory: packages/shared

      - run: npx tsc --noEmit
        working-directory: apps/api

      - run: npx tsc --noEmit
        working-directory: apps/web

  # ── Tests ─────────────────────────────────────────────────────────────────────
  # Runs in parallel with typecheck for faster feedback.
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "true"
      NODE_ENV: test
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: API tests
        run: npm test --workspace=apps/api -- --coverage --ci

      - name: Upload API coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

      - name: Web tests
        run: npm test --workspace=apps/web -- --passWithNoTests

  # ── Build ─────────────────────────────────────────────────────────────────────
  # Only runs once both typecheck and test pass.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build web
        run: npm run build --workspace=apps/web

      - name: Upload API artefact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 7

      - name: Upload web artefact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7

  # ── Docker ────────────────────────────────────────────────────────────────────
  docker:
    name: Docker
    needs: build
    uses: ./.github/workflows/docker.yml
    permissions:
      contents: read
      packages: write
