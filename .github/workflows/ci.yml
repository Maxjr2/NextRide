name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type checking ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Build shared package (required for downstream type checks)
        run: npm run build --workspace=packages/shared

      - name: Type-check shared package
        run: npx tsc --noEmit
        working-directory: packages/shared

      - name: Type-check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type-check web app
        run: npx tsc --noEmit
        working-directory: apps/web

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      MOCK_MODE: "true"
      NODE_ENV: test
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Run tests with coverage
        run: npm test --workspace=apps/api -- --coverage --ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Generate Prisma client (validates schema)
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: "postgresql://localhost:5432/placeholder"

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build web app
        run: npm run build --workspace=apps/web

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 7

  # ── Docker build (on main only) ───────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: nextride-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
